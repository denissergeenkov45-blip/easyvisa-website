<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <title>Pricing for Visa and Residency Services</title>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto my-8">
        <h1 class="text-3xl font-bold mb-6 text-center">Pricing for Visa and Residency Services</h1>
        <table class="min-w-full bg-white border border-gray-300">
            <thead class="bg-gray-200">
                <tr>
                    <th class="py-2 px-4 border-b">Service</th>
                    <th class="py-2 px-4 border-b">Price</th>
                </tr>
            </thead>
            <tbody>
                <tr class="hover:bg-gray-100">
                    <td class="py-2 px-4 border-b">Visa Application</td>
                    <td class="py-2 px-4 border-b">$150</td>
                </tr>
                <tr class="hover:bg-gray-100">
                    <td class="py-2 px-4 border-b">Temporary Residency</td>
                    <td class="py-2 px-4 border-b">$300</td>
                </tr>
                <tr class="hover:bg-gray-100">
                    <td class="py-2 px-4 border-b">Permanent Residency</td>
                    <td class="py-2 px-4 border-b">$500</td>
                </tr>
                <tr class="hover:bg-gray-100">
                    <td class="py-2 px-4 border-b">Citizenship Application</td>
                    <td class="py-2 px-4 border-b">$600</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
